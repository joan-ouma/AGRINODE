services:
  mqtt-broker:
    image: eclipse-mosquitto:latest
    container_name: agrinode-broker
    volumes:
      - ../mosquitto/config:/mosquitto/config
      - ../mosquitto/data:/mosquitto/data
      - ../mosquitto/log:/mosquitto/log
    restart: unless-stopped

  postgres-db:
    image: postgres:15
    container_name: agrinode-postgres
    environment:
      POSTGRES_USER: agrinode_admin
      POSTGRES_PASSWORD: supersecretpassword
      POSTGRES_DB: agrinode
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
    restart: unless-stopped

  pgadmin:
    image: dpage/pgadmin4
    container_name: agrinode-pgadmin
    environment:
      PGADMIN_DEFAULT_EMAIL: admin@agrinode.local
      PGADMIN_DEFAULT_PASSWORD: adminpassword
    ports:
      - "5050:80"
    depends_on:
      - postgres-db
    restart: unless-stopped

  zookeeper:
    image: confluentinc/cp-zookeeper:7.6.1
    container_name: agrinode-zookeeper
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
      ZOOKEEPER_TICK_TIME: 2000
    ports:
      - "2181:2181"
    restart: unless-stopped

  agrinode-api:
    build:
      context: .
      dockerfile: Dockerfile.api
    restart: always
    # We do NOT map ports to the host. We want this hidden behind Nginx!
    depends_on:
      - postgres-db
    deploy:
      replicas: 2 # THIS IS THE BOSS MOVE: Spin up TWO identical Go APIs

  agrinode-simulator:
    build:
      context: .
      dockerfile: Dockerfile.simulator
    restart: always
    depends_on:
      - mqtt-broker

  agrinode-ingestion:
    build:
      context: .
      dockerfile: Dockerfile.ingestion
    restart: always
    depends_on:
      - mqtt-broker
      - kafka

  agrinode-storage:
    build:
      context: .
      dockerfile: Dockerfile.storage
    restart: always
    depends_on:
      - postgres-db
      - kafka

  agrinode-mongodb:
    image: mongo:6.0
    container_name: agrinode-mongodb
    restart: always
    volumes:
      - mongodb-data:/data/db

  agrinode-event-publisher:
    build:
      context: .
      dockerfile: Dockerfile.event-publisher
    restart: always
    depends_on:
      - postgres-db
      - kafka

  agrinode-command:
    build:
      context: .
      dockerfile: Dockerfile.command
    restart: always
    depends_on:
      - mqtt-broker
      - kafka

  agrinode-analytics:
    build:
      context: .
      dockerfile: Dockerfile.analytics
    restart: always
    depends_on:
      - agrinode-mongodb

  agrinode-frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    restart: always
    volumes:
      - ./frontend:/app
      - /app/node_modules

  nginx:
    image: nginx:latest
    ports:
      - "80:80" # This is the ONLY open door to the outside world
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - agrinode-api
      - agrinode-frontend

  kafka:
    image: confluentinc/cp-kafka:7.6.1
    container_name: agrinode-kafka
    depends_on:
      - zookeeper
    ports:
      - "9092:9092"
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:29092,PLAINTEXT_HOST://agrinode-kafka:9092
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT,PLAINTEXT_HOST:PLAINTEXT
      KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
    restart: unless-stopped

volumes:
  postgres-data:
  mongodb-data: