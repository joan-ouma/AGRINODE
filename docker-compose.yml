services:
  mqtt-broker:
    image: eclipse-mosquitto:latest
    container_name: agrinode-broker
    ports:
      - "1883:1883"
      - "9001:9001"
    volumes:
      - ../mosquitto/config:/mosquitto/config
      - ../mosquitto/data:/mosquitto/data
      - ../mosquitto/log:/mosquitto/log
    restart: unless-stopped

  postgres-db:
    image: postgres:15
    container_name: agrinode-postgres
    environment:
      POSTGRES_USER: agrinode_admin
      POSTGRES_PASSWORD: supersecretpassword
      POSTGRES_DB: agrinode
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
    restart: unless-stopped

  pgadmin:
    image: dpage/pgadmin4
    container_name: agrinode-pgadmin
    environment:
      PGADMIN_DEFAULT_EMAIL: admin@agrinode.local
      PGADMIN_DEFAULT_PASSWORD: adminpassword
    ports:
      - "5050:80"
    depends_on:
      - postgres-db
    restart: unless-stopped

volumes:
  postgres-data: