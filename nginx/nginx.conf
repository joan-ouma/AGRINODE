events {
    worker_connections 1024;
}

http {
    # The Load Balancer Pool
    upstream api_servers {
        server agrinode-api:8080;
    }

    server {
        # Nginx listens on the standard HTTP port (80)
        listen 80;

        # Route all other requests to the Vite dev server
        location / {
            proxy_pass http://agrinode-frontend:5173;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            
            # WebSocket support for Vite HMR
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "upgrade";
        }

        # When a user asks for /api/, Nginx secretly hands it to the Go API pool
        location /api/ {
            proxy_pass http://api_servers;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        }
    }
}
